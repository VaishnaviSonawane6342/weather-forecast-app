<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap By SKILLHUB</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="weather-container">


        <div class="header">
            <div class="weather-logo">
                <i class="bi bi-cloud-sun-fill"></i>
            </div>

            <h1 class="title">Weather Forecast</h1>

            <p class="subtitle">
                Get real-time weather updates
            </p>
        </div>



        <div class="search-box">

            <input type="text" class="city-input" placeholder="Enter City Name" id="city">

            <i class="bi bi-search search-icon" title="search weather" onclick="handleAsyncWeather()"></i>

        </div>


        <div id="root" class="mt-4">


        </div>

    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
